<div class="matches-container glass-panel">
  <div class="matches-header">
    <div class="header-content">
      <h2>Remaining Matches</h2>
      <p>Predict the winner to see playoffs</p>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab" [class.active]="matchFilter() === 'ALL'" (click)="setFilter('ALL')">
        All
      </button>
      <button class="filter-tab" [class.active]="matchFilter() === 'UPCOMING'" (click)="setFilter('UPCOMING')">
        Upcoming
      </button>
      <button class="filter-tab" [class.active]="matchFilter() === 'COMPLETED'" (click)="setFilter('COMPLETED')">
        Completed
      </button>
    </div>
  </div>
  <div class="matches-list">
    @for (match of filteredMatches(); track match.id) {
    <div class="match-card" [class.completed-match]="isPastMatch(match) && !canPredictMatch(match)">
      <div class="match-info">
        Match {{ match.matchNo }} &bull; {{ match.date }} ({{ match.day }})
      </div>
      @if (match.info) {
      <div class="match-toss">{{ match.info }}</div>
      }
      <div class="teams-container">
        <!-- Team 1 -->
        <button class="team-btn" [class.selected]="match.winnerId === match.team1Id"
          [class.dimmed]="match.winnerId && match.winnerId !== match.team1Id" [disabled]="!canPredictMatch(match)"
          (click)="selectWinner(match.id, match.team1Id, match)">
          <img [src]="getTeamLogo(match.team1Id)" [alt]="match.team1Id + ' logo'" class="team-logo" />
          <span class="team-id">{{ match.team1Id }}</span>
          @if (match.winnerId === match.team1Id) {
          <div class="selection-indicator">✓</div>
          }
        </button>
        <div class="vs-badge">VS</div>
        <!-- Team 2 -->
        <button class="team-btn" [class.selected]="match.winnerId === match.team2Id"
          [class.dimmed]="match.winnerId && match.winnerId !== match.team2Id" [disabled]="!canPredictMatch(match)"
          (click)="selectWinner(match.id, match.team2Id, match)">
          @if (match.winnerId === match.team2Id) {
          <div class="selection-indicator">✓</div>
          }
          <span class="team-id">{{ match.team2Id }}</span>
          <img [src]="getTeamLogo(match.team2Id)" [alt]="match.team2Id + ' logo'" class="team-logo" />
        </button>
      </div>
    </div>
    }
  </div>
</div>
